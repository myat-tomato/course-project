<div class="row">
  <div class="col-12">
    <form (ngSubmit)="onSubmit(f)" #f="ngForm">
      <div class="row g-3 align-items-end">

        <div class="col-md-5">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" class="form-control" name="name" [(ngModel)]="name" required>
        </div>

        <div class="col-md-2">
          <label for="amount" class="form-label">Amount</label>
          <input type="number" id="amount" class="form-control" name="amount" [(ngModel)]="amount" required
            pattern="^[1-9]+[0-9]*$">
        </div>

      </div>

      <div class="mt-3">
        <button class="btn btn-success me-2" type="submit" [disabled]="!f.valid">
          {{editMode() ? 'Update' : 'Add'}}
        </button>

        @if(editMode()){
        <button class="btn btn-danger me-2" type="button" (click)="onDelete(f)">
          Delete
        </button>
        }
        <button class="btn btn-secondary" type="button" (click)="onClear(f)">
          Clear
        </button>
      </div>
    </form>
  </div>
</div>
